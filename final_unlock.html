<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 The Final Unlock 🔐</n>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fce4ec; /* Light pink background */
            color: #4a4a4a;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #e91e63; /* Deep pink for header */
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            font-size: 2em;
        }
        .container {
            flex-grow: 1;
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #e91e63;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .instruction {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #c2185b;
        }
        #code-input {
            padding: 10px;
            font-size: 1.5em;
            width: 150px;
            text-align: center;
            border: 2px solid #e91e63;
            border-radius: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        #unlock-button {
            background-color: #e91e63;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        #unlock-button:hover {
            background-color: #c2185b;
            transform: scale(1.05);
        }
        #message {
            margin-top: 20px;
            font-size: 1.2em;
            color: red;
            font-weight: bold;
        }
        #unlocked-content {
            display: none;
            margin-top: 30px;
            text-align: center;
            width: 100%;
        }
        #unlocked-content h2 {
            color: #c2185b;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        #love-letter {
            white-space: pre-wrap;
            text-align: left;
            margin-bottom: 30px;
            padding: 20px;
            border: 1px dashed #e91e63;
            background-color: #ffe0f0;
            border-radius: 10px;
            font-size: 1.1em;
            line-height: 1.8;
        }
        .unlocked-image {
            max-width: 100%;
            height: auto;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .back-button {
            display: inline-block;
            background-color: #c2185b;
            color: white;
            padding: 10px 20px;
            margin-top: 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .back-button:hover {
            background-color: #ad1457;
            transform: scale(1.05);
        }
        footer {
            margin-top: auto; /* Pushes footer to the bottom */
            padding: 20px 0;
            color: #888;
            font-size: 0.9em;
        }
        .congratulations-banner {
            background-color: #ffccbc; /* Lighter pink/peach */
            color: #e91e63;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
            font-size: 1.8em;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            border: 3px solid #e91e63;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 10px rgba(233, 30, 99, 0.5); }
            to { transform: scale(1.02); box-shadow: 0 0 20px rgba(233, 30, 99, 0.8); }
        }
    </style>
</head>
<body>
    <header>
        <h1>🔐 The Final Unlock! 🔐</h1>
    </header>

    <div class="container">
        <p class="instruction">Collect all the code pieces from the games and enter the complete code here to unlock your special anniversary surprises!</p>
        <input type="text" id="code-input" placeholder="Enter Code" maxlength="3">
        <button id="unlock-button">Unlock!</button>
        <p id="message"></p>

        <div id="unlocked-content">
            <div class="congratulations-banner">
                🎉 Congratulations! You unlocked it! 🎉
            </div>
            <h2>💖 Happy Anniversary, My Dearest! 💖</h2>
            <div id="love-letter">
                My love,

                One year ago, we started this incredible journey together, and every single day since has been a gift. You fill my life with so much joy, laughter, and an unimaginable depth of love. You are my rock, my best friend, and my greatest adventure.

                Thank you for every moment, every memory, and for simply being you. I cherish our connection, our shared dreams, and all the little things that make us, us.

                Here's to many more years of love, laughter, and shared wavelengths. I love you more than words can say.

                Forever yours,
                [Your Name - The Creator]
            </div>

            <h3>A Special Message for You!</h3>
            <img src="/content/WhatsApp Image 2026-04-18 at 1.05.05 AM.jpeg" alt="Anniversary Image 1" class="unlocked-image">
            <img src="/content/WhatsApp Image 2026-04-18 at 1.05.05 AM (1).jpeg" alt="Anniversary Image 2" class="unlocked-image">
        </div>
        <a href="index.html" class="back-button" style="margin-top: 40px;">Back to Homepage</a>
    </div>

    <footer>
        <p>Created with all my love ❤️</p>
    </footer>

    <script>
        const correctCode = "LEV"; // L (Hearts), E (Crossword), V (Wavelength)
        const codeInput = document.getElementById('code-input');
        const unlockButton = document.getElementById('unlock-button');
        const messageDisplay = document.getElementById('message');
        const unlockedContent = document.getElementById('unlocked-content');

        unlockButton.addEventListener('click', () => {
            const enteredCode = codeInput.value.toUpperCase();
            if (enteredCode === correctCode) {
                unlockedContent.style.display = 'block';
                messageDisplay.textContent = 'Code Accepted! Enjoy your surprise! 🎉';
                messageDisplay.style.color = '#388e3c'; // Green color for success
            } else {
                messageDisplay.textContent = 'Incorrect Code. Keep searching!';
                messageDisplay.style.color = 'red';
            }
        });
    </script>
</body>
</html>
