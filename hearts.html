<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Catch the Hearts ❤️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fce4ec; /* Light pink background */
            color: #4a4a4a;
            text-align: center;
            overflow: hidden; /* Prevent scrollbars from hearts */
        }
        header {
            background-color: #e91e63; /* Deep pink for header */
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            font-size: 2em;
        }
        .game-container {
            position: relative;
            width: 80%;
            max-width: 800px;
            height: 500px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 20px auto;
            overflow: hidden;
            border: 2px solid #e91e63;
        }
        .heart {
            position: absolute;
            font-size: 2.5em;
            cursor: pointer;
            animation: fall linear forwards;
            user-select: none; /* Prevent text selection */
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.3));
        }
        .score-board {
            margin-top: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #e91e63;
        }
        .message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: #e91e63;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none; /* Hidden by default */
        }
        .message-overlay p {
            margin: 10px 0;
        }
        .message-overlay .code-display {
            font-size: 3em;
            color: #c2185b;
            margin-top: 20px;
            padding: 10px 20px;
            border: 3px dashed #e91e63;
            border-radius: 15px;
            background-color: #ffe0f0;
        }
        .start-button {
            background-color: #e91e63;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 20px;
        }
        .start-button:hover {
            background-color: #c2185b;
            transform: scale(1.05);
        }
        .back-button {
            display: inline-block;
            background-color: #c2185b;
            color: white;
            padding: 10px 20px;
            margin-top: 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .back-button:hover {
            background-color: #ad1457;
            transform: scale(1.05);
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(calc(500px + 50px)); /* Game container height + heart size */
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>❤️ Catch My Heart! ❤️</h1>
    </header>

    <div class="score-board">
        Score: <span id="score">0</span> | Time Left: <span id="timer">60</span>s
    </div>

    <div class="game-container" id="game-container">
        <div class="message-overlay" id="start-overlay">
            <p>Catch as many hearts as you can!</p>
            <p>Goal: 10 hearts in 60 seconds</p>
            <button class="start-button" id="start-game-button">Start Game</button>
        </div>

        <div class="message-overlay" id="game-over-overlay">
            <p id="game-over-message"></p>
            <p id="code-message" style="display: none;">Your code piece is:</p>
            <div class="code-display" id="code-reward"></div>
            <a href="index.html" class="back-button">Back to Homepage</a>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreSpan = document.getElementById('score');
        const timerSpan = document.getElementById('timer');
        const startOverlay = document.getElementById('start-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const gameOverMessage = document.getElementById('game-over-message');
        const codeMessage = document.getElementById('code-message');
        const codeReward = document.getElementById('code-reward');
        const startGameButton = document.getElementById('start-game-button');

        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let heartSpawnInterval;
        const heartsToWin = 10; // Set the win condition to 10 hearts

        function spawnHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.textContent = '💖';

            const startX = Math.random() * (gameContainer.offsetWidth - 50); // -50 for heart width
            heart.style.left = startX + 'px';
            heart.style.top = '-50px'; // Start above container

            const animationDuration = 3 + Math.random() * 2; // 3 to 5 seconds
            heart.style.animationDuration = animationDuration + 's';

            heart.onclick = () => {
                score++;
                scoreSpan.textContent = score;
                heart.remove();
            };

            gameContainer.appendChild(heart);

            // Remove heart if it reaches the bottom without being clicked
            heart.addEventListener('animationend', () => {
                heart.remove();
            });
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            scoreSpan.textContent = score;
            timerSpan.textContent = timeLeft;
            startOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';

            // Clear any existing hearts
            document.querySelectorAll('.heart').forEach(h => h.remove());

            heartSpawnInterval = setInterval(spawnHeart, 700); // Spawn a heart every 0.7 seconds
            gameInterval = setInterval(() => {
                timeLeft--;
                timerSpan.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(heartSpawnInterval);

            // Remove any remaining hearts
            document.querySelectorAll('.heart').forEach(h => h.remove());

            gameOverOverlay.style.display = 'flex';
            if (score >= heartsToWin) {
                gameOverMessage.textContent = "You caught my heart! 💖 You Win!";
                codeMessage.style.display = 'block';
                codeReward.textContent = "L";
            } else {
                gameOverMessage.textContent = `Time's up! You caught ${score} hearts. Keep trying!`;
                codeMessage.style.display = 'none';
                codeReward.textContent = ""; // Clear any previous code
            }
        }

        startGameButton.addEventListener('click', startGame);

        // Initial state: show start overlay
        startOverlay.style.display = 'flex';

    </script>
</body>
</html>
